<!DOCTYPE html>

<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F2F4F8;color:#1a1a2e;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#F2F4F8}
#hdr{background:linear-gradient(135deg,#1F6B75,#2A8A99);padding:12px 16px 10px;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(0,0,0,.2)}
#hdr .hdr-top{display:flex;justify-content:space-between;align-items:center}
#hdr .brand{color:rgba(255,255,255,.6);font-size:10px;font-weight:700;letter-spacing:3px}
#hdr .title{color:#fff;font-size:19px;font-weight:800;margin-top:2px}
#content{flex:1;padding:14px 13px 100px;overflow-y:auto}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:300;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.nb{flex:1;padding:8px 2px 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nb .ni{font-size:18px}.nb .nl{font-size:9px;font-weight:700;color:#aaa}
.nb .nd{width:18px;height:3px;border-radius:2px;margin-top:1px;opacity:0;background:#1F6B75}
.nb.active .nl{color:#1F6B75}.nb.active .nd{opacity:1}
.card{background:#fff;border-radius:14px;padding:14px 15px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:11px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f2f8}
.row:last-child{border-bottom:none}
.rl{font-size:11px;color:#888}.rv{font-size:13px;font-weight:500}.rv.acc{font-weight:800;color:#1F6B75}
.abtn{padding:10px 18px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.abtn-sm{padding:7px 12px;font-size:12px;border-radius:9px}
.fld{margin-bottom:13px}.fld label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #dde3f0;font-size:14px;background:#fafbff;color:#1a1a2e;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.fld textarea{resize:vertical;min-height:60px}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:#1F6B75}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end}
.mbox{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto}
.mhd{padding:15px 18px;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.mhd h3{color:#fff;font-size:16px;font-weight:800}
.mcl{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:4px 11px;cursor:pointer;font-size:18px}
.mbody{padding:16px 18px}
.kbanner{background:linear-gradient(135deg,#1F6B75,#2E75B6);border-radius:16px;padding:18px;margin-bottom:14px;color:#fff}
.kgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.kcard{background:#fff;border-radius:12px;padding:11px 8px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center}
.filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:2px solid #2E75B6;background:#fff;color:#2E75B6}
.fbtn.active{background:#2E75B6;color:#fff}
.lform{background:#F2F4F8;border-radius:12px;padding:12px;margin-bottom:10px}
.lhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ablue{background:#D6EAF8;color:#2E75B6;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:600}
.agreen{background:#E2EFDA;color:#217346;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:600}
.totbox{background:#F2F4F8;border-radius:10px;padding:12px}
.totfin{display:flex;justify-content:space-between;align-items:center;border-top:2px solid #1F6B75;margin-top:8px;padding-top:8px}
.art-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent}
.art-item:active{border-color:#1F6B75;background:#F0FAF8}
.march-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#F8FAFF;border-radius:9px;margin-bottom:6px;border:1px solid #E8EEF8}
.dd-item{display:block;width:100%;padding:12px 18px;background:#fff;border:none;text-align:left;font-size:13px;font-weight:600;color:#1a1a2e;cursor:pointer;border-bottom:1px solid #f0f2f8}
.dd-item:last-child{border-bottom:none}
.dd-item:active,.dd-item:hover{background:#f0faf8;color:#1F6B75}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-top">
      <div><div class="brand">GESTRANS</div><div class="title" id="ptitle">Accueil</div></div>
      <div style="position:relative" id="menu-wrap">
        <button id="menu-btn" onclick="toggleMenu()" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:10px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
          &#9776; Menu
        </button>
        <div id="dropdown" style="display:none;position:absolute;top:42px;right:0;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:210px;overflow:hidden;z-index:9999">
          <div style="background:linear-gradient(135deg,#1F6B75,#2A8A99);padding:10px 16px;font-size:11px;font-weight:800;color:rgba(255,255,255,.8);letter-spacing:1px">GESTION</div>
          <button class="dd-item" data-action="goClients">&#128101; Clients</button>
          <button class="dd-item" data-action="goArticles">&#127970; Articles</button>
          <button class="dd-item" data-action="goLocations" style="color:#7030A0;font-weight:800">&#128665; Locations de camions</button>
          <div style="background:#f0f2f8;padding:8px 16px;font-size:11px;font-weight:800;color:#888;letter-spacing:1px">RAPPORTS &amp; OUTILS</div>
          <button class="dd-item" data-action="goRapport">&#128203; Rapport PDF global</button>
          <button class="dd-item" data-action="goVehicules">&#128665; Suivi des véhicules</button>
          <button class="dd-item" data-action="goRappels">&#128276; Rappels automatiques</button>
          <div style="background:#f0f2f8;padding:8px 16px;font-size:11px;font-weight:800;color:#888;letter-spacing:1px">NAVIGATION</div>
          <button class="dd-item" onclick="go('stats');closeMenu()">&#128202; Statistiques</button>
          <div style="background:#f0f2f8;padding:8px 16px;font-size:11px;font-weight:800;color:#888;letter-spacing:1px">SYNCHRONISATION</div>
          <button class="dd-item" data-action="exportDB" style="color:#217346">&#128228; Exporter les données</button>
          <button class="dd-item" data-action="importDB" style="color:#C05000">&#128229; Importer les données</button>
          <button class="dd-item" data-action="importFicheClient" style="color:#1F6B75;font-weight:800">&#128228; Importer fiche client</button>
          <input type="file" id="importFile" accept=".json" style="display:none">
          <input type="file" id="importFicheFile" accept=".json" style="display:none">
        </div>
      </div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nb active" data-tab="dashboard"   onclick="go('dashboard')">  <span class="ni">&#127968;</span><span class="nl">Accueil</span>   <div class="nd"></div></button>
    <button class="nb"        data-tab="livraisons"  onclick="go('livraisons')"> <span class="ni">&#128230;</span><span class="nl">Livraisons</span> <div class="nd"></div></button>
    <button class="nb"        data-tab="paiements"   onclick="go('paiements')">  <span class="ni">&#128176;</span><span class="nl">Paiements</span>  <div class="nd"></div></button>
    <button class="nb"        data-tab="pertes"      onclick="go('pertes')">     <span class="ni">&#9888;</span><span class="nl">Pertes</span>      <div class="nd"></div></button>
    <button class="nb"        data-tab="facturation" onclick="go('facturation')"><span class="ni">&#129534;</span><span class="nl">Factures</span>   <div class="nd"></div></button>
    <button class="nb"        data-tab="stats"       onclick="go('stats')">      <span class="ni">&#128202;</span><span class="nl">Stats</span>      <div class="nd"></div></button>
  </nav>
</div>

<script>
// ══════ BASE DE DONNÉES ══════
var _DB_DEF = {
  commercants:[],
  articles:[],
  livraisons:[],
  paiements:[],
  pertes:[],
  factures:[],
  vehicules:[],
  chauffeurs:[],
  locations:[]
};
var _stored=null;
try{_stored=JSON.parse(localStorage.getItem('gestrans')||'null');}catch(e){}
var DB=_stored||_DB_DEF;
DB.commercants = DB.commercants||[];
DB.articles    = DB.articles||[];
DB.livraisons  = DB.livraisons||[];
DB.paiements   = DB.paiements||[];
DB.pertes      = DB.pertes||[];
DB.factures    = DB.factures||[];
DB.vehicules   = DB.vehicules||[];
DB.chauffeurs  = DB.chauffeurs||[];
DB.locations   = DB.locations||[];

function dbSave(){try{localStorage.setItem('gestrans',JSON.stringify(DB));}catch(e){alert('Erreur de sauvegarde: stockage plein ?');}}

// ══════ CALCULS REVENUS ══════
function calcRevenus(){
  var totalFact=DB.factures.reduce(function(s,f){return s+tfact(f).ttc;},0);
  var encFact=DB.factures.filter(function(f){return f.statut==='Regle'||f.statut==='Payee';}).reduce(function(s,f){return s+tfact(f).ttc;},0);
  var totalPay=DB.paiements.reduce(function(s,p){return s+p.montant;},0);
  var encPay=DB.paiements.filter(function(p){return p.statut==='Paye';}).reduce(function(s,p){return s+p.montant;},0);
  var impPay=DB.paiements.filter(function(p){return p.statut==='Impaye';}).reduce(function(s,p){return s+p.montant;},0);
  var attFact=DB.factures.filter(function(f){return f.statut==='En attente'||f.statut==='Impayee';}).reduce(function(s,f){return s+tfact(f).ttc;},0);
  var totalLoc=DB.locations.reduce(function(s,l){return s+(+l.montant||0);},0);
  var locPayees=DB.locations.filter(function(l){return l.statut==='Payee';}).reduce(function(s,l){return s+(+l.montant||0);},0);
  var encTotal=encFact+encPay;
  return {
    totalFact:totalFact, encFact:encFact,
    totalPay:totalPay,   encPay:encPay,
    totalRev:totalFact+totalPay,
    encTotal:encTotal,
    attente:attFact+impPay,
    totalLoc:totalLoc,
    locPayees:locPayees,
    beneficeNet:encTotal-locPayees,
    beneficePotentiel:(totalFact+totalPay)-totalLoc
  };
}

// ══════ HELPERS ══════
function fmt(n){return new Intl.NumberFormat('fr-FR').format(Math.round(n)||0)+' FCFA';}
function fmtN(n){return new Intl.NumberFormat('fr-FR').format(Math.round(n)||0);}
function fmtD(d){return d?new Date(d+'T00:00:00').toLocaleDateString('fr-FR'):'-';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nextId(arr,pfx){
  var nums=arr.map(function(x){return parseInt((x.id||'').replace(pfx+'-',''))||0;});
  return pfx+'-'+String(Math.max.apply(null,[0].concat(nums))+1).padStart(3,'0');
}
function tfact(f){
  var ht=(f.lignes||[]).reduce(function(s,l){return s+(+l.qte||0)*(+l.prixU||0);},0);
  var tva=f.tva||0;
  return {ht:ht,tva:ht*tva/100,ttc:ht+ht*tva/100};
}
function tliv(l){return (l.marchandises||[]).reduce(function(s,m){return s+(+m.qte||0)*(+m.prixU||0);},0);}
function findById(arr,id){return (arr||[]).filter(function(x){return x.id===id;})[0]||null;}

var SC={
  "Livre":"background:#E2EFDA;color:#217346","En transit":"background:#D6EAF8;color:#2E75B6",
  "En attente":"background:#FFFACD;color:#833C00","Retard":"background:#FCE4D6;color:#833C00",
  "Perdu":"background:#FFE0E0;color:#C00000","Paye":"background:#E2EFDA;color:#217346",
  "Payee":"background:#E2EFDA;color:#217346","Regle":"background:#E2EFDA;color:#217346",
  "Impaye":"background:#FFE0E0;color:#C00000","Impayee":"background:#FFE0E0;color:#C00000",
  "Partiel":"background:#FCE4D6;color:#833C00","Partielle":"background:#FCE4D6;color:#833C00",
  "Annulee":"background:#F2F4F8;color:#555","En cours":"background:#FFFACD;color:#833C00",
  "Resolu":"background:#E2EFDA;color:#217346","Rejete":"background:#FFE0E0;color:#C00000",
  "Actif":"background:#E2EFDA;color:#217346","Inactif":"background:#F2F4F8;color:#555","Suspendu":"background:#FFE0E0;color:#C00000"
};
function badge(s){return '<span class="badge" style="'+(SC[s]||'background:#eee;color:#333')+'">'+esc(s)+'</span>';}
function rowH(l,v,acc){return '<div class="row"><span class="rl">'+l+'</span><span class="rv'+(acc?' acc':'')+'">'+v+'</span></div>';}
function mkBtn(txt,action,id,color,outline,small,xs){
  var bg=outline?'transparent':color,tc=outline?color:'#fff',di=id?(' data-id="'+esc(id)+'"'):'';
  return '<button class="abtn'+(small?' abtn-sm':'')+'" data-action="'+action+'"'+di+' style="background:'+bg+';color:'+tc+';border-color:'+color+';'+(xs||'')+'">'+txt+'</button>';
}
function fld(label,name,type,val,opts,req){
  var r=req?'<span style="color:#C00000"> *</span>':'',v=(val!==undefined&&val!==null)?String(val):'';
  if(type==='textarea'){return '<div class="fld"><label>'+label+r+'</label><textarea name="'+name+'">'+esc(v)+'</textarea></div>';}
  if(opts&&opts.length){
    var os=opts.map(function(o){return '<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+esc(o)+'</option>';}).join('');
    return '<div class="fld"><label>'+label+r+'</label><select name="'+name+'"><option value="">-- Choisir --</option>'+os+'</select></div>';
  }
  return '<div class="fld"><label>'+label+r+'</label><input type="'+(type||'text')+'" name="'+name+'" value="'+esc(v)+'"></div>';
}
function getF(id){
  var o={},el=document.getElementById(id);if(!el)return o;
  el.querySelectorAll('input,select,textarea').forEach(function(e){if(e.name)o[e.name]=e.value;});
  return o;
}

// ══════ MODAL ══════
function showModal(title,html,color){
  closeModal();
  var ov=document.createElement('div');
  ov.className='mov';ov.id='modal-ov';
  ov.innerHTML='<div class="mbox"><div class="mhd" style="background:'+(color||'#1F6B75')+'"><h3>'+title+'</h3><button class="mcl" data-action="closeModal">&#10005;</button></div><div class="mbody" id="mbody">'+html+'</div></div>';
  ov.addEventListener('click',function(e){if(e.target===ov){e.stopPropagation();closeModal();}});
  document.body.appendChild(ov);
}
function closeModal(){var m=document.getElementById('modal-ov');if(m)m.remove();}

// ══════ DÉLÉGATION D'ÉVÉNEMENTS ══════
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');if(!el)return;
  e.stopPropagation();
  var a=el.getAttribute('data-action'),id=el.getAttribute('data-id')||'';
  var map={
    closeModal:function(){closeModal();},
    goClients:function(){closeMenu();openSection('commercants');},
    goArticles:function(){closeMenu();openSection('articles');},
    goLocations:function(){closeMenu();showLocationsPage();},
    goRapport:function(){closeMenu();genererRapportPDF();},
    goVehicules:function(){closeMenu();showVehiculesPage();},
    addVeh:function(){openVeh(null);},editVeh:function(){openVeh(parseInt(id));},delVeh:function(){delVeh(parseInt(id));},saveVeh:function(){saveVeh();},
    addChauf:function(){openChauf(null);},editChauf:function(){openChauf(parseInt(id));},delChauf:function(){delChauf(parseInt(id));},saveChauf:function(){saveChauf();},
    goRappels:function(){closeMenu();showRappelsPage();},
    exportDB:function(){closeMenu();exporterDonnees();},
    importDB:function(){closeMenu();document.getElementById('importFile').click();},
    importFicheClient:function(){closeMenu();document.getElementById('importFicheFile').click();},
    confirmFicheClient:function(){confirmerFicheClient();},
    // Locations
    addLoc:function(){openLoc(null);},editLoc:function(){openLoc(id);},delLoc:function(){delLoc(id);},saveLoc:function(){saveLoc();},payerLoc:function(){payerLoc(id);},
    // Clients
    addCom:function(){openCom(null);},editCom:function(){openCom(id);},delCom:function(){delCom(id);},saveCom:function(){saveCom();},
    // Articles
    addArt:function(){openArt(null);},editArt:function(){openArt(id);},delArt:function(){delArt(id);},saveArt:function(){saveArt();},
    pickArt:function(){pickArticle(id);},cancelPickArt:function(){restoreParentModal();},
    // Livraisons
    addLiv:function(){openLiv(null);},editLiv:function(){openLiv(id);},delLiv:function(){delLiv(id);},saveLiv:function(){saveLiv();},
    ajML:function(){ajML();},rmML:function(){rmML(parseInt(id));},pickArtML:function(){pickArtForML(parseInt(id));},
    setFil:function(){_lf=id;rLiv();},
    // Paiements
    addPay:function(){openPay(null);},editPay:function(){openPay(id);},payerPay:function(){payerPay(id);},delPay:function(){delPay(id);},savePay:function(){savePay();},
    // Pertes
    addPerte:function(){openPerte(null);},editPerte:function(){openPerte(id);},cloturePerte:function(){cloturePerte(id);},delPerte:function(){delPerte(id);},savePerte:function(){savePerte();},
    // Factures
    addFact:function(){openFact(null);},editFact:function(){openFact(id);},voirFact:function(){voirFact(id);},
    payerFact:function(){payerFact(id);},
    payerFactModal:function(){payerFact(id);},
    delFact:function(){delFact(id);},saveFact:function(){saveFact();},
    ajFL:function(){ajFL();},rmFL:function(){rmFL(parseInt(id));},pickArtFL:function(){pickArtForFL(parseInt(id));},
    importLiv:function(){importDepuisLiv();},
    pdfFact:function(){pdfFact(id);},printFact:function(){printFact(id);}
  };
  if(map[a])map[a]();
});

// ══════ NAVIGATION ══════
var _currentTab='dashboard';
function go(tab){
  _currentTab=tab;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});
  var titles={dashboard:'Accueil',livraisons:'Livraisons',paiements:'Paiements',pertes:'Pertes',facturation:'Factures',stats:'Statistiques'};
  document.getElementById('ptitle').textContent=titles[tab]||tab;
  document.getElementById('content').scrollTop=0;closeModal();
  ({dashboard:rDash,livraisons:rLiv,paiements:rPay,pertes:rPerte,facturation:rFact,stats:rStats})[tab]();
}
function openSection(sec){
  if(sec==='commercants')showCommercantsPage();
  else if(sec==='articles')showArticlesPage();
}

// ══════ MENU DROPDOWN ══════
function toggleMenu(){
  var d=document.getElementById('dropdown');
  d.style.display=d.style.display==='none'?'block':'none';
}
function closeMenu(){
  var d=document.getElementById('dropdown');
  if(d)d.style.display='none';
}
document.addEventListener('click',function(e){
  var wrap=document.getElementById('menu-wrap');
  if(wrap&&!wrap.contains(e.target))closeMenu();
},{capture:false});

// ══════ DASHBOARD ══════
function rDash(){
  var rv=calcRevenus();
  var nL=DB.livraisons.length;
  var nLv=DB.livraisons.filter(function(l){return l.statut==='Livre';}).length;
  var nC=DB.livraisons.filter(function(l){return l.statut==='En transit'||l.statut==='En attente';}).length;
  var nP=DB.livraisons.filter(function(l){return l.statut==='Retard'||l.statut==='Perdu';}).length;
  var kpis=[
    {i:'&#128230;',v:nL,l:'Livraisons',c:'#2E75B6'},
    {i:'&#9989;',v:nLv,l:'Livrees',c:'#217346'},
    {i:'&#128260;',v:nC,l:'En cours',c:'#833C00'},
    {i:'&#9888;',v:nP,l:'Problemes',c:'#C00000'},
    {i:'&#128101;',v:DB.commercants.length,l:'Clients',c:'#1F3864'},
    {i:'&#129534;',v:DB.factures.length,l:'Factures',c:'#1F6B75'}
  ];
  var dL=[].concat(DB.livraisons).reverse().slice(0,3).map(function(l){

  var art=findById(DB.articles,artId);if(!art)return;

    ML[_pickIdx].desc=art.nom;ML[_pickIdx].unite=art.unite;ML[_pickIdx].prixU=art.prixU;
  } else if(_pickTarget==='FL'&&_pickIdx>=0&&_pickIdx<FL.length){
    FL[_pickIdx].desc=art.nom;FL[_pickIdx].unite=art.unite;FL[_pickIdx].prixU=art.prixU;
  }
  restoreParentModal();
}
function restoreParentModal(){
  var mbody=document.getElementById('mbody');
  var mhd=document.querySelector('.mhd');
  if(mbody&&_savedModalHTML!==null){
    mbody.innerHTML=_savedModalHTML;
    if(mhd&&_savedModalColor){mhd.style.background=_savedModalColor;}
    _savedModalHTML=null;
    if(_pickTarget==='ML'){renderML();}

}

function pdfFact(id){
  var html=buildFactHTML(id);if(!html)return;
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='Facture-'+id+'.html';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  setTimeout(function(){alert('Telecharge : Facture-'+id+'.html\nOuvrez dans Chrome > Imprimer > Enregistrer en PDF');},400);
}
function printFact(id){
  var html=buildFactHTML(id);if(!html)return;
  var w=window.open('','_blank','width=800,height=600');
  if(!w){alert('Autorisez les pop-ups pour imprimer');return;}
  w.document.write(html);w.document.close();
  w.onload=function(){w.print();};
}

// ══════ STATISTIQUES ══════
function rStats(){
  var now=new Date();
  var annee=now.getFullYear();
  var mCur=now.getMonth();
  var moisNoms=['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
  function abbreviate(n){
    if(n>=1000000)return Math.round(n/100000)/10+'M';
    if(n>=1000)return Math.round(n/100)/10+'k';
    return String(Math.round(n));
  }

// ══════ RAPPELS AUTOMATIQUES ══════
function showRappelsPage(){
  var today=new Date();today.setHours(0,0,0,0);
  var rappels=[];
  DB.factures.forEach(function(f){
    if(f.statut==='Regle'||f.statut==='Payee')return;
    if(!f.dateEch)return;
    var ech=new Date(f.dateEch+'T00:00:00');
    var diff=Math.floor((today-ech)/(1000*60*60*24));
    if(diff>0)rappels.push({type:'danger',icon:'🔴',label:'Facture en retard',desc:f.id+' · '+esc(f.nomCom),detail:'Échue depuis '+diff+' jour'+(diff>1?'s':''),action:'voirFact',id:f.id});
    else if(diff>=-7)rappels.push({type:'warn',icon:'🟡',label:'Échéance proche',desc:f.id+' · '+esc(f.nomCom),detail:'Échéance dans '+(Math.abs(diff))+' jour'+(Math.abs(diff)>1?'s':''),action:'voirFact',id:f.id});
  });
  DB.paiements.forEach(function(p){
    if(p.statut==='Paye')return;
    rappels.push({type:'warn',icon:'🟠',label:'Paiement impayé',desc:p.id+' · '+esc(p.description),detail:'Montant : '+(p.montant||0).toLocaleString('fr-FR')+' FCFA',action:null,id:p.id});
  });
  DB.livraisons.forEach(function(l){
    if(l.statut==='Livre')return;
    if(!l.dateExp)return;
    var exp=new Date(l.dateExp+'T00:00:00');
    var diff=Math.floor((today-exp)/(1000*60*60*24));
    if(diff>=3)rappels.push({type:'info',icon:'🔵',label:'Livraison en attente',desc:l.id+' · '+esc(l.villeD)+' → '+esc(l.villeA),detail:'Expédiée il y a '+diff+' jours',action:null,id:l.id});
  });
  var html='';
  if(rappels.length===0){
    html='<div style="text-align:center;padding:30px 0;color:#888"><div style="font-size:48px">✅</div><div style="margin-top:10px;font-weight:700">Aucun rappel en attente</div><div style="font-size:12px;margin-top:4px">Tout est à jour !</div></div>';
  } else {
    var colors={danger:'#FDECEA',warn:'#FFF8E1',info:'#EBF5FB'};
    var borders={danger:'#C00000',warn:'#F39C12',info:'#2E75B6'};
    html='<div style="font-size:12px;color:#888;margin-bottom:12px">'+rappels.length+' rappel'+(rappels.length>1?'s':'')+' en attente</div>'+
    rappels.map(function(r){
      return '<div style="background:'+colors[r.type]+';border-left:4px solid '+borders[r.type]+';border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div><div style="font-size:12px;font-weight:800;color:'+borders[r.type]+'">'+r.icon+' '+r.label+'</div>'+
        '<div style="font-size:13px;font-weight:700;margin-top:3px">'+r.desc+'</div>'+
        '<div style="font-size:11px;color:#888;margin-top:2px">'+r.detail+'</div></div>'+
        (r.action?'<button class="abtn abtn-sm" style="background:'+borders[r.type]+';color:#fff;border-color:'+borders[r.type]+'" data-action="'+r.action+'" data-id="'+r.id+'">Voir →</button>':'')+
        '</div></div>';
    }).join('');
  }
  var nbUrgent=rappels.filter(function(r){return r.type==='danger';}).length;
  showModal('🔔 Rappels Automatiques',html,'#833C00');
  if(nbUrgent>0){
    var wrap=document.getElementById('menu-wrap');
    if(wrap&&!document.getElementById('menu-badge')){
      var badge=document.createElement('span');badge.id='menu-badge';
      badge.style.cssText='position:absolute;top:-4px;right:-4px;background:#C00000;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;pointer-events:none';
      badge.textContent=nbUrgent;
      wrap.appendChild(badge);
    }
  }
}

  var heure=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}).replace(':','h');
  var nom='GESTRANS-'+date+'-'+heure+'.json';
  var data=JSON.stringify({version:1,exportedAt:now.toISOString(),db:DB},null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=nom;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  setTimeout(function(){
    showModal('✅ Export réussi',
      '<div style="text-align:center;padding:10px 0">'+
      '<div style="font-size:48px;margin-bottom:12px">📤</div>'+
      '<div style="font-size:15px;font-weight:800;color:#217346;margin-bottom:8px">Fichier exporté !</div>'+
      '<div style="font-size:13px;color:#555;margin-bottom:16px">Fichier : <strong>'+nom+'</strong></div>'+
      '<div style="background:#E2EFDA;border-radius:10px;padding:14px;text-align:left;font-size:13px;line-height:1.8">'+
      '1. Ouvre <strong>WhatsApp</strong><br>2. Va dans la conversation<br>3. Clique sur 📎 pièce jointe<br>'+
      '4. Sélectionne <strong>'+nom+'</strong><br>5. Envoie !</div></div>',
    '#217346');
  },300);
}
document.getElementById('importFile').addEventListener('change',function(e){

  var reader=new FileReader();

        '<div style="background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px">'+
        '📄 Fichier : <strong>'+file.name+'</strong><br>'+
        '🕐 Exporté le : <strong>'+exportDate+'</strong><br>'+
        '📦 Livraisons : <strong>'+(newDB.livraisons||[]).length+'</strong><br>'+
        '🧾 Factures : <strong>'+(newDB.factures||[]).length+'</strong><br>'+
        '💳 Paiements : <strong>'+(newDB.paiements||[]).length+'</strong></div>'+
        '<div style="display:flex;gap:10px">'+
        '<button class="abtn" style="flex:1;background:#eee;color:#333" data-action="closeModal">Annuler</button>'+
        '<button class="abtn" style="flex:1;background:#C05000;color:#fff" id="confirmImport">✅ Confirmer</button>'+
        '</div></div>','#C05000');
      document.getElementById('confirmImport').onclick=function(){
        DB.commercants = newDB.commercants || DB.commercants;
        DB.articles    = newDB.articles    || DB.articles;
        DB.livraisons  = newDB.livraisons  || DB.livraisons;
        DB.paiements   = newDB.paiements   || DB.paiements;
        DB.pertes      = newDB.pertes      || DB.pertes;
        DB.factures    = newDB.factures    || DB.factures;
        DB.vehicules   = newDB.vehicules   || DB.vehicules || [];
        DB.chauffeurs  = newDB.chauffeurs  || DB.chauffeurs || [];
        DB.locations   = newDB.locations   || DB.locations  || [];
        dbSave();closeModal();go(_currentTab);
        setTimeout(function(){
          showModal('✅ Import réussi',
            '<div style="text-align:center;padding:16px 0"><div style="font-size:48px;margin-bottom:12px">🎉</div>'+
            '<div style="font-size:15px;font-weight:800;color:#217346">Données importées avec succès !</div></div>','#217346');
        },200);
      };
    }catch(err){alert('❌ Erreur lors de la lecture du fichier.\n'+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
});

// ══════ IMPORT FICHE CLIENT ══════
var _ficheEnAttente = null;

document.getElementById('importFicheFile').addEventListener('change', function(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var parsed = JSON.parse(ev.target.result);
      // Vérifier que c'est bien un formulaire client
      if(parsed._source !== 'formulaire-client' || !parsed.livraison){
        alert('❌ Ce fichier n\'est pas une fiche client GESTRANS.\nUtilisez "Importer les données" pour un fichier de sauvegarde.');
        e.target.value=''; return;
      }
      _ficheEnAttente = parsed.livraison;
      var liv = parsed.livraison;
      var genDate = parsed._generatedAt ? new Date(parsed._generatedAt).toLocaleString('fr-FR') : 'inconnue';
      var totalVal = (liv.marchandises||[]).reduce(function(s,m){return s+(+m.qte||0)*(+m.prixU||0);},0);
      var totalQte = (liv.marchandises||[]).reduce(function(s,m){return s+(+m.qte||0);},0);

      // Trouver si le client existe déjà
      var clientTrouve = DB.commercants.find(function(c){
        return c.nom.toLowerCase().trim() === (liv.nomClient||'').toLowerCase().trim();
      });

      var marchs = (liv.marchandises||[]).map(function(m){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0F2F8">'+
          '<div><div style="font-size:13px;font-weight:700">'+esc(m.desc)+'</div>'+
          '<div style="font-size:11px;color:#888">'+esc(m.categorie)+' · '+m.qte+' '+esc(m.unite)+(m.poids>0?' · '+m.poids+' kg':'')+'</div></div>'+
          (m.prixU>0?'<div style="font-size:13px;font-weight:800;color:#1F6B75">'+fmt((+m.qte||0)*(+m.prixU||0))+'</div>':
          '<div style="font-size:11px;color:#aaa">Prix non renseigné</div>')+'</div>';
      }).join('');

      // Construire les options clients pour associer
      var comOpts = '<option value="">— Nouveau client —</option>' +
        DB.commercants.map(function(c){
          return '<option value="'+esc(c.id)+'"'+(clientTrouve&&clientTrouve.id===c.id?' selected':'')+'>'+esc(c.nom)+'</option>';
        }).join('');

      showModal('📨 Fiche Client Reçue',
        '<div id="fiche-wrap">'+
        // Info fiche
        '<div style="background:#E6F7F9;border-radius:12px;padding:12px;margin-bottom:14px">'+
        '<div style="font-size:11px;color:#888;margin-bottom:6px">Reçu le '+genDate+'</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div><div style="font-size:11px;color:#888">Client</div><div style="font-weight:800;color:#1F3864">'+esc(liv.nomClient)+'</div></div>'+
        '<div><div style="font-size:11px;color:#888">Téléphone</div><div style="font-weight:700">'+esc(liv.telClient)+'</div></div>'+
        '<div><div style="font-size:11px;color:#888">Destination</div><div style="font-weight:800;color:#1F6B75">📍 '+esc(liv.villeA)+'</div></div>'+
        '<div><div style="font-size:11px;color:#888">Date</div><div style="font-weight:700">'+fmtD(liv.dateExp)+'</div></div>'+
        '</div>'+
        (liv.obs?'<div style="margin-top:8px;font-size:12px;color:#555"><strong>Obs :</strong> '+esc(liv.obs)+'</div>':'')+
        '</div>'+

        // Associer à un client
        '<div style="margin-bottom:14px">'+
        '<div style="font-size:12px;font-weight:700;color:#1F3864;margin-bottom:6px">🔗 Associer à un client GESTRANS</div>'+
        '<select id="ficheClientId" style="width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #DDE3F0;font-size:14px;font-family:inherit;background:#fafbff;-webkit-appearance:none">'+comOpts+'</select>'+
        '<div style="font-size:11px;color:#888;margin-top:4px">Si le client n\'existe pas encore, laissez "Nouveau client" — il sera créé automatiquement.</div>'+
        '</div>'+

        // Marchandises
        '<div style="font-size:12px;font-weight:700;color:#1F3864;margin-bottom:8px">📦 Marchandises ('+((liv.marchandises||[]).length)+' · Qté totale : '+totalQte+')</div>'+
        '<div style="background:#F8FAFF;border-radius:10px;padding:10px 12px;margin-bottom:14px">'+marchs+'</div>'+

        // Total
        (totalVal>0?'<div style="background:linear-gradient(135deg,#1F6B75,#2E75B6);border-radius:10px;padding:12px;color:#fff;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-size:13px;opacity:.8">Valeur estimée</span>'+
        '<span style="font-size:18px;font-weight:900">'+fmt(totalVal)+'</span></div>':'<div style="background:#FFF8E1;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#7B3F00">ℹ️ Les prix n\'ont pas été renseignés par le client. Vous pourrez les compléter après import.</div>')+

        // Boutons
        '<div style="display:flex;gap:10px">'+
        '<button class="abtn" style="flex:1;background:#eee;color:#333" data-action="closeModal">Annuler</button>'+
        '<button class="abtn" style="flex:1;background:linear-gradient(135deg,#1F6B75,#2A8A99);color:#fff" data-action="confirmFicheClient">✅ Créer la livraison</button>'+
        '</div></div>',
      '#1F6B75');

    }catch(err){alert('❌ Erreur de lecture du fichier.\n'+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
});

function confirmerFicheClient(){
  if(!_ficheEnAttente){closeModal();return;}
  var liv = _ficheEnAttente;
  var selClient = document.getElementById('ficheClientId');
  var idComChoisi = selClient ? selClient.value : '';

  // Créer le client s'il n'existe pas
  if(!idComChoisi){
    var newCom = {
      id: nextId(DB.commercants,'COM'),
      nom: liv.nomClient || 'Client inconnu',
      tel: liv.telClient || '',
      ville: liv.villeA || '',
      type: 'Autres',
      statut: 'Actif',
      email: '',
      notes: 'Créé automatiquement depuis fiche client'
    };
    DB.commercants.push(newCom);
    idComChoisi = newCom.id;
  }

  // Créer la livraison
  var newLiv = {
    id: nextId(DB.livraisons,'LIV'),
    dateExp: liv.dateExp || new Date().toISOString().slice(0,10),
    datePrev: '',
    dateReel: '',
    idCom: idComChoisi,
    villeD: liv.villeD || 'Abidjan',
    villeA: liv.villeA || '',
    statut: 'En attente',
    obs: liv.obs || '',
    marchandises: (liv.marchandises||[]).map(function(m){
      return {
        desc: m.desc + (m.categorie && m.categorie!==m.desc ? ' ('+m.categorie+')' : ''),
        unite: m.unite || 'Unités',
        qte: +m.qte || 0,
        prixU: +m.prixU || 0
      };
    })
  };
  DB.livraisons.push(newLiv);
  dbSave();
  _ficheEnAttente = null;
  closeModal();
  go('livraisons');
  setTimeout(function(){
    showModal('🎉 Livraison créée !',
      '<div style="text-align:center;padding:16px 0">'+
      '<div style="font-size:52px;margin-bottom:12px">📦</div>'+
      '<div style="font-size:16px;font-weight:900;color:#1F6B75;margin-bottom:6px">'+esc(newLiv.id)+' créée !</div>'+
      '<div style="font-size:13px;color:#555;margin-bottom:14px">La fiche client a été importée avec succès.</div>'+
      '<div style="background:#E6F7F9;border-radius:10px;padding:12px;text-align:left;font-size:13px;line-height:1.8">'+
      '📍 <strong>'+esc(newLiv.villeD)+' → '+esc(newLiv.villeA)+'</strong><br>'+
      '📦 <strong>'+(newLiv.marchandises.length)+' article(s)</strong> importés<br>'+
      '⚠️ Pensez à compléter les <strong>prix</strong> si non renseignés.</div></div>',
    '#1F6B75');
  },200);
}

// DÉMARRAGE
go('dashboard');

(function(){

  };
  var blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  document.getElementById('pwa-manifest').setAttribute('href', url);

  // Service Worker inline pour PWA offline
  if('serviceWorker' in navigator){
    var swCode = [
      'var CACHE="gestrans-v1";',
      'self.addEventListener("install",function(e){',
      '  self.skipWaiting();',
      '});',
      'self.addEventListener("activate",function(e){',
      '  e.waitUntil(clients.claim());',
      '});',
      'self.addEventListener("fetch",function(e){',
      '  e.respondWith(fetch(e.request).catch(function(){',
      '    return caches.match(e.request);',
      '  }));',
      '});'
    ].join('\n');
    var swBlob = new Blob([swCode], {type:'text/javascript'});
    var swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(function(){});
  }

  // Bouton d'installation personnalisé
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner(){
    if(document.getElementById('install-banner'))return;
    var banner = document.createElement('div');
    banner.id = 'install-banner';

      '</div>';

    document.getElementById('install-yes').onclick = function(){
      banner.remove();
      if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
    };
    document.getElementById('install-no').onclick = function(){banner.remove();};
  }

  // Sur iOS — afficher les instructions manuelles
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone;

})();
